services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - path: ./api/.env
        required: false
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/docsai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_FILE=/run/secrets/api_jwt_secret
      - JWT_REFRESH_SECRET_FILE=/run/secrets/api_refresh_secret
      - EMAIL_VERIFICATION_JWT_SECRET_FILE=/run/secrets/api_email_verification_secret
      - PASSWORD_RESET_JWT_SECRET_FILE=/run/secrets/api_password_reset_secret
      - SMTP_PASS_FILE=/run/secrets/api_smtp_pass
      - SUPER_ADMIN_BOOTSTRAP_KEY_FILE=/run/secrets/api_super_admin_bootstrap_key
      - STRIPE_SECRET_KEY_FILE=/run/secrets/stripe_secret_key
      - STRIPE_WEBHOOK_SECRET_FILE=/run/secrets/stripe_webhook_secret
    secrets:
      - api_jwt_secret
      - api_refresh_secret
      - api_email_verification_secret
      - api_password_reset_secret
      - api_smtp_pass
      - api_super_admin_bootstrap_key
      - stripe_secret_key
      - stripe_webhook_secret
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:5000/readyz'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./api:/repo/api

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./app:/repo/app
      - /repo/app/.next

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./workers:/repo/workers
    env_file:
      - path: ./workers/.env
        required: false
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/docsai
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI_FILE=/run/secrets/worker_mongodb_uri
      - REDIS_URL_FILE=/run/secrets/worker_redis_url
    secrets:
      - worker_mongodb_uri
      - worker_redis_url

  redis:
    image: redis:7
    container_name: docsai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    container_name: docsai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: docsai
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
  redis_data:

secrets:
  api_jwt_secret:
    file: ./secrets/api_jwt_secret.txt
  api_refresh_secret:
    file: ./secrets/api_refresh_secret.txt
  api_email_verification_secret:
    file: ./secrets/api_email_verification_secret.txt
  api_password_reset_secret:
    file: ./secrets/api_password_reset_secret.txt
  api_smtp_pass:
    file: ./secrets/api_smtp_pass.txt
  api_super_admin_bootstrap_key:
    file: ./secrets/api_super_admin_bootstrap_key.txt
  stripe_secret_key:
    file: ./secrets/stripe_secret_key.txt
  stripe_webhook_secret:
    file: ./secrets/stripe_webhook_secret.txt
  worker_mongodb_uri:
    file: ./secrets/worker_mongodb_uri.txt
  worker_redis_url:
    file: ./secrets/worker_redis_url.txt
