services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./api/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/docsai
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:5000/readyz'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./api:/app
      - /app/node_modules

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./app:/app
      - /app/node_modules
      - /app/.next

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./workers:/app
      - /app/node_modules
    env_file:
      - ./workers/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/docsai
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:7
    container_name: docsai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    container_name: docsai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: docsai
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
  redis_data:
