name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.mjs'
              - '.github/workflows/ci.yml'
            app:
              - 'app/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.mjs'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (api)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm install --include-workspace-root --workspace api
      - run: npm run lint --workspace api
      - run: npm run typecheck --workspace api
      - run: npm run test --workspace api --if-present
        env:
          MONGODB_URI: mongodb://localhost:27017/docsai
          REDIS_URL: redis://localhost:6379
      - run: npm run build --workspace api

  frontend:
    name: Frontend (app)
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm install --include-workspace-root --workspace app
      - run: npm run lint --workspace app
      - run: npm run typecheck --workspace app
      - run: npm run test --workspace app --if-present
      - run: npm run build --workspace app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

  ci-success:
    name: CI Success
    needs: [changes, backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "A job failed."
            exit 1
          fi
          echo "OK — all applicable jobs passed."